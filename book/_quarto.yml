project:
  type: book
  output-dir: _book
  execute-dir: project

book:
  title: "One MCMC Fit for Many Plausible Values"
  subtitle: "A Replication Guide"
  author:
    - name: JoonHo Lee
      affiliations: [The University of Alabama]
    - name: Matthew R. Williams
      affiliations: [U.S. Bureau of Labor Statistics]
    - name: Terrance D. Savitsky
      affiliations: [U.S. Bureau of Labor Statistics]
  date: "2026"
  chapters:
    - index.qmd
    - setup.qmd
    - methods.qmd
    - simulation.qmd
    - pisa-data.qmd
    - pisa-workflows.qmd
    - reproducibility.qmd
    - faq.qmd
  repo-url: "https://github.com/joonho112/pvstackr-replication"
  repo-subdir: "book"
  repo-actions: [source, issue]
  page-navigation: true
  search: true
  sidebar:
    style: docked
    collapse-level: 1

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-copy: true
    code-overflow: wrap
    fig-align: center
    tbl-cap-location: bottom
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

lang: en
