name: validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::digest
            any::jsonlite
            any::yaml
            any::testthat
            any::ggplot2
            any::dplyr
            any::tidyr
            any::ggforce
            any::patchwork
            any::Matrix
            any::loo
            any::posterior
      - name: Quick reproduction
        run: Rscript run_all.R --track quick
      - name: Verification suite
        run: Rscript run_all.R --track verify
      - name: Upload comparison reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: verification/reports/
          if-no-files-found: warn
