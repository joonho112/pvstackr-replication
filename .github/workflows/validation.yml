name: validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::digest
            any::jsonlite
            any::yaml
            any::testthat
            any::ggplot2
            any::dplyr
            any::tidyr
            any::ggforce
            any::patchwork
            any::Matrix
            any::loo
            any::posterior
      - name: Debug manifest fixture (temporary)
        run: |
          Rscript -e '
          source("tools/public_files.R")
          root <- getwd()
          scratch <- tempfile("dbg-"); dir.create(scratch, recursive = TRUE)
          public <- c(pv_public_files(root), "manifest/artifacts.csv")
          ok <- vapply(public, function(rel) {
            t <- file.path(scratch, rel); dir.create(dirname(t), recursive = TRUE, showWarnings = FALSE)
            file.copy(file.path(root, rel), t, overwrite = TRUE, copy.mode = TRUE, copy.date = TRUE)
          }, logical(1))
          cat("copied:", sum(ok), "of", length(public), " failed-copy:", paste(public[!ok], collapse=", "), "\n")
          out <- system2(file.path(R.home("bin"),"Rscript"), c("--vanilla", shQuote(file.path(scratch,"verification","verify_manifest.R"))), stdout = TRUE, stderr = TRUE)
          cat("--- fixture verify_manifest output (status", attr(out,"status"), ") ---\n"); cat(out, sep = "\n")
          '
      - name: Quick reproduction
        run: Rscript run_all.R --track quick
      - name: Verification suite
        run: Rscript run_all.R --track verify
      - name: Upload comparison reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: verification/reports/
          if-no-files-found: warn
